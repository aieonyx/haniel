name: HANIEL CI
# Copyright (c) 2026 Edison Lepiten / AIEONYX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            llvm \
            clang \
            lld

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build HANIEL crates
        run: |
          cargo build -p haniel_herald \
                      -p haniel_prism \
                      -p haniel_canvas \
                      -p haniel_vault \
                      -p haniel_echo \
                      -p haniel_onyx \
                      -p haniel_sentinel \
                      -p haniel_lumen \
                      -p haniel

      - name: Run tests
        run: |
          cargo test -p haniel_herald \
                     -p haniel_prism \
                     -p haniel_canvas \
                     -p haniel_vault \
                     -p haniel_echo \
                     -p haniel_onyx \
                     -p haniel_sentinel \
                     -p haniel_lumen \
                     -p haniel \
                     -- --test-threads=1

      - name: Clippy
        run: |
          cargo clippy -p haniel_herald \
                       -p haniel_prism \
                       -p haniel_canvas \
                       -p haniel_vault \
                       -p haniel_echo \
                       -p haniel_onyx \
                       -p haniel_sentinel \
                       -p haniel_lumen \
                       -p haniel \
                       -- -D warnings
